<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careers | Sterilization Services</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="container nav">
    <a href="index.html" class="logo">
      <img src="images/logo2_transparent.png" alt="Sterilization Services Logo">
    </a>

    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="process.html">Process</a>
      <a href="contact.html" class="btn">Contact Us</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h1>Careers</h1>
    <p>Join our team and help support safe, dependable sterilization solutions.</p>
  </div>
</section>

<section class="section">
  <div class="container narrow">
    <div class="form-card">
      <form class="form">
        <label for="career-name">Full Name</label>
        <input type="text" id="career-name" name="career-name" placeholder="Enter your full name">

        <label for="career-email">Email Address</label>
        <input type="email" id="career-email" name="career-email" placeholder="Enter your email address">

        <label for="career-phone">Phone Number</label>
        <input type="text" id="career-phone" name="career-phone" placeholder="Enter your phone number">

        <label for="position">Position of Interest</label>
        <input type="text" id="position" name="position" placeholder="Enter the role you are interested in">

        <label for="experience">Experience / Background</label>
        <textarea id="experience" name="experience" rows="6" placeholder="Tell us about yourself and your experience"></textarea>

        <button type="submit" class="btn-primary form-submit">Submit Application</button>
      </form>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container footer-links">
    <p>© 2026 Sterilization Services</p>
    <p><a href="careers.html">Careers</a></p>
  </div>
</footer>

</body>
</html>
